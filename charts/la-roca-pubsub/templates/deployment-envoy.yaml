apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-envoy
spec:
  replicas: {{ .Values.envoy.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-envoy
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-envoy
    spec:
      containers:
          - name: envoy
            image: "{{ .Values.envoy.image.repository }}:{{ .Values.envoy.image.tag }}"
            ports:
              - containerPort: 8080
            volumeMounts:
              - name: envoy-config-volume
                mountPath: /etc/envoy/envoy.yaml
                subPath: envoy.yaml
      volumes:
        - name: envoy-config-volume
          configMap:
            name: {{ .Release.Name }}-envoy-config